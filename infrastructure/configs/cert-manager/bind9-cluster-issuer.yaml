apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: bind9-issuer
spec:
  acme:
    email: samuelnorth47@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: bind9-acme-account-key 
    solvers:
    - dns01:
        rfc2136:
          nameserver: 192.168.4.1:5354
          tsigKeyName: "externaldns-key"
          tsigAlgorithm: HMACSHA512
          tsigSecretSecretRef:
            name: bind9-tsig-secret
            key: tsig-secret