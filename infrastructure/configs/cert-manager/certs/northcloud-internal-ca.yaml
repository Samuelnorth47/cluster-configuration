apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: northcloud-internal-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: northcloud-internal-ca
  secretName: northcloud-internal-ca-secret
  issuerRef:
    name: selfsigned-bootstrap-issuer
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
    size: 256