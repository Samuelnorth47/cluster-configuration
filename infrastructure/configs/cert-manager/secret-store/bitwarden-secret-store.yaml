apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bitwarden-secretsmanager
  # Ensure this is in the same namespace as your ExternalSecret 
  # or use a ClusterSecretStore if you want it available everywhere.
  namespace: external-secrets-system 
spec:
  provider:
    bitwardensecretsmanager:
      apiURL: https://api.bitwarden.com
      identityURL: https://identity.bitwarden.com
      auth:
        secretRef:
          credentials:
            name: bitwarden-access-token # The K8s secret containing your BW Token
            key: token
            namespace: external-secrets-system
      # FIX 1: Point to the correct namespace where your SDK pod is running
      bitwardenServerSDKURL: https://bitwarden-sdk-server.external-secrets-system.svc.cluster.local:9998
      
      # FIX 2: Point to the Internal CA we just created
      caBundle: |
         
      organizationID: 117c189e-93a7-4cf3-a8c8-b401002b74b3
      projectID: 4ba4e35f-05f7-495a-83d4-b4030023d054
