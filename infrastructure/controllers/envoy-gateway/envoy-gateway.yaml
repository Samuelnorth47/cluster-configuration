apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  releaseName: envoy-gateway
  targetNamespace: envoy-gateway-system
  interval: 30m
  chart:
    spec:
      chart: gateway-helm
      version: "v1.7.1"
      sourceRef:
        kind: HelmRepository
        name: envoyproxy
        namespace: flux-system
  install:
    crds: CreateReplace
    createNamespace: true
  upgrade:
    crds: CreateReplace
  values:
    installCRDs: true
