apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  releaseName: envoy-gateway
  targetNamespace: envoy-gateway-system
  interval: 30m
  chart:
    spec:
      chart: gateway-helm
      sourceRef:
        kind: OCIRepository
        name: envoy-gateway
        namespace: flux-system
  install:
    crds: CreateReplace
    createNamespace: true
  upgrade:
    crds: CreateReplace
