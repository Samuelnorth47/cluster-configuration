apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-token
  namespace: default
spec:
  data:
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: GHCR_TOKEN
        metadataPolicy: None
      secretKey: password
  refreshInterval: 1h0m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: ghcr-creds 
    template:
      data:
        username: Samuelnorth47
