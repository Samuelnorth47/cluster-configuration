# clusters/test-cluster/configuration.yaml
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-configs
  namespace: flux-system
spec:
  dependsOn:
    - name: app-controllers
  interval: 10m
  path: ./apps/configs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
