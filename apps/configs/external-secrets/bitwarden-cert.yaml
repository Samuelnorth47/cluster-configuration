apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bitwarden-sdk-certs
  namespace: external-secrets-system
spec:
  secretName: bitwarden-tls-certs 
  dnsNames:
    - bitwarden-sdk-server.external-secrets-system.svc.cluster.local
  issuerRef:
    name: local-ca-issuer
    kind: ClusterIssuer