apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets 
  namespace: flux-system
spec:
  releaseName: external-secrets
  targetNamespace: external-secrets-system
  install:
    createNamespace: true
  interval: 30m
  chart:
    spec:
      chart: external-secrets
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      version: "2.0.0"
  values:
    bitwarden-sdk-server:
      enabled: true
      extraVolumes:
        - name: internal-ca
          secret:
            secretName: bitwarden-tls-certs
      extraVolumeMounts:
        - name: internal-ca
          mountPath: /etc/ssl/certs/bitwarden-ca.crt
          subPath: ca.crt
          readOnly: true

    # Move these to the ROOT level for the main operator pod
    extraVolumes:
      - name: internal-ca
        secret:
          secretName: bitwarden-tls-certs
    extraVolumeMounts:
      - name: internal-ca
        mountPath: /etc/ssl/certs/bitwarden-ca.crt
        subPath: ca.crt
        readOnly: true
    env:
      - name: SSL_CERT_FILE
        value: /etc/ssl/certs/bitwarden-ca.crt
